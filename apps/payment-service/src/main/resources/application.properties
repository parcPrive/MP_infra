spring.application.name=payment-service

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:payment-service-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.max.block.ms=${KAFKA_MAX_BLOCK_MS:1000}

# 테스트 환경에서는 false로 꺼두고, Docker Compose에서는 true 기본값으로 Kafka 메시지를 소비합니다.
app.kafka.listener.enabled=${KAFKA_LISTENER_ENABLED:true}
app.kafka.topic.order-created=${ORDER_CREATED_TOPIC:order.created}
app.kafka.topic.payment-completed=${PAYMENT_COMPLETED_TOPIC:payment.completed}

# Consumer 처리 실패 시 총 3번까지 처리해 보고, 그래도 실패하면 원본 메시지를 {topic}.DLT로 보냅니다.
app.kafka.retry.max-attempts=${KAFKA_RETRY_MAX_ATTEMPTS:3}
app.kafka.retry.backoff-ms=${KAFKA_RETRY_BACKOFF_MS:1000}
app.kafka.retry.dlt-suffix=${KAFKA_DLT_SUFFIX:.DLT}
