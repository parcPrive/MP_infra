spring.application.name=order-service

# DB_URL 환경변수가 있으면 그 값을 사용하고, 없으면 로컬 개발용 기본값을 사용합니다.
# Compose 안에서는 jdbc:postgresql://order-db:5432/orderdb 값을 주입합니다.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:15432/orderdb}
spring.datasource.username=${DB_USER:orderuser}
spring.datasource.password=${DB_PASSWORD:orderpass}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:16379}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.max.block.ms=${KAFKA_MAX_BLOCK_MS:1000}

# 주문 조회 결과를 Redis에 저장해둘 시간입니다.
# 300초가 지나면 Redis가 해당 캐시 key를 자동 삭제합니다.
app.cache.order-ttl-seconds=${ORDER_CACHE_TTL_SECONDS:300}

# 주문 생성 후 발행할 Kafka topic 이름입니다.
app.kafka.topic.order-created=${ORDER_CREATED_TOPIC:order.created}

# 학습 단계에서는 엔티티 변경에 맞춰 테이블을 자동 보정합니다.
# 운영 환경에서는 validate 또는 migration 도구(Flyway/Liquibase)를 사용하는 편이 안전합니다.
spring.jpa.hibernate.ddl-auto=update

# Controller 응답 시점 이후에 JPA 세션을 열어두지 않습니다.
# API 서버에서는 예측 가능한 트랜잭션 경계를 위해 false로 두는 편이 좋습니다.
spring.jpa.open-in-view=false
