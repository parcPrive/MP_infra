# 테스트에서는 실제 PostgreSQL 컨테이너 대신 메모리 DB인 H2를 사용합니다.
# MODE=PostgreSQL은 H2가 PostgreSQL과 비슷한 문법으로 동작하도록 맞추는 옵션입니다.
spring.datasource.url=jdbc:h2:mem:order-service-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=

spring.data.redis.host=localhost
spring.data.redis.port=16379

spring.kafka.bootstrap-servers=localhost:19092
spring.kafka.producer.properties.max.block.ms=1000

# 테스트가 시작될 때 테이블을 만들고, 끝나면 정리합니다.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
