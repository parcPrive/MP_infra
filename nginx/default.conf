server {
    # NGINX 컨테이너 내부 80 포트에서 HTTP 요청을 받습니다.
    listen 80;
    server_name localhost;

    # Docker Compose 네트워크의 내부 DNS 서버입니다.
    # order-service 컨테이너가 재생성되어 IP가 바뀌어도 이름을 다시 해석할 수 있게 합니다.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Compose 서비스 이름(order-service)으로 Spring Boot 컨테이너를 찾습니다.
    set $order_service http://order-service:8080;

    location / {
        # 들어온 모든 경로를 order-service로 전달합니다.
        # 예: /orders -> http://order-service:8080/orders
        proxy_pass $order_service;

        # 원래 요청 정보를 Spring Boot 쪽에서 확인할 수 있도록 헤더를 전달합니다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
