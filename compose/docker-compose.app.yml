services:
  # Spring Boot 주문 API 컨테이너입니다.
  # build는 로컬 Dockerfile로 이미지를 만들고, image는 만들어질 이미지 이름/태그를 지정합니다.
  order-service:
    build:
      context: ../apps/order-service
      dockerfile: Dockerfile
    image: orderservice:0.1
    container_name: order-service
    # DB가 준비되기 전에 앱이 먼저 뜨면 연결 실패가 날 수 있어서 healthcheck를 기다립니다.
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # 컨테이너 내부에서는 localhost가 자기 자신입니다.
    # 그래서 DB 주소는 같은 Compose 네트워크의 서비스 이름(order-db)을 사용합니다.
    environment:
      DB_URL: jdbc:postgresql://order-db:5432/orderdb
      DB_USER: orderuser
      DB_PASSWORD: orderpass
      # Redis도 같은 Compose 네트워크의 서비스 이름(redis)으로 접근합니다.
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 주문 캐시 TTL입니다. 300초 뒤 Redis key가 자동 만료됩니다.
      ORDER_CACHE_TTL_SECONDS: 300
      # Kafka도 같은 Compose 네트워크의 서비스 이름(kafka)으로 접근합니다.
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ORDER_CREATED_TOPIC: order.created
    # Mac의 8081 포트를 컨테이너 내부 8080 포트에 연결합니다.
    ports:
      - "8081:8080"

  # order.created Kafka 이벤트를 소비해 결제 처리를 흉내내는 서비스입니다.
  payment-service:
    build:
      context: ../apps/payment-service
      dockerfile: Dockerfile
    image: paymentservice:0.1
    container_name: payment-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: payment-service-group
      ORDER_CREATED_TOPIC: order.created
      PAYMENT_COMPLETED_TOPIC: payment.completed
      # Consumer 실패 처리 설정입니다. 3회 처리 시도 후 {topic}.DLT로 원본 메시지를 보냅니다.
      KAFKA_RETRY_MAX_ATTEMPTS: 3
      KAFKA_RETRY_BACKOFF_MS: 1000
      KAFKA_DLT_SUFFIX: .DLT
    ports:
      - "8083:8080"

  # payment.completed Kafka 이벤트를 소비해 재고 차감을 흉내내는 서비스입니다.
  inventory-service:
    build:
      context: ../apps/inventory-service
      dockerfile: Dockerfile
    image: inventoryservice:0.1
    container_name: inventory-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: inventory-service-group
      PAYMENT_COMPLETED_TOPIC: payment.completed
      # Consumer 실패 처리 설정입니다. 3회 처리 시도 후 {topic}.DLT로 원본 메시지를 보냅니다.
      KAFKA_RETRY_MAX_ATTEMPTS: 3
      KAFKA_RETRY_BACKOFF_MS: 1000
      KAFKA_DLT_SUFFIX: .DLT
    ports:
      - "8084:8080"

  # 주문 데이터가 저장되는 PostgreSQL 컨테이너입니다.
  order-db:
    image: postgres:16-alpine
    container_name: order-db
    # 공식 postgres 이미지가 처음 실행될 때 이 값으로 DB/사용자를 생성합니다.
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
    # Mac에 이미 PostgreSQL이 5432로 떠 있어서 충돌을 피하려고 15432로 열었습니다.
    ports:
      - "15432:5432"
    # 컨테이너를 지웠다 다시 만들어도 DB 데이터가 유지되도록 named volume을 사용합니다.
    volumes:
      - order-db-data:/var/lib/postgresql/data
    # pg_isready로 DB가 접속 가능한 상태인지 확인합니다.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 이후 조회 캐시, 세션, 임시 데이터 저장 실습에 사용할 Redis 컨테이너입니다.
  redis:
    image: redis:7-alpine
    container_name: commerce-redis
    # Mac에 이미 Redis가 6379로 떠 있어서 충돌을 피하려고 16379로 열었습니다.
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    # redis-cli ping 결과가 PONG이면 healthy로 봅니다.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 주문 생성 이벤트를 흘려보낼 Kafka broker입니다.
  kafka:
    image: apache/kafka:4.0.0
    container_name: commerce-kafka
    hostname: kafka
    environment:
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "19092:19092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # 외부 요청을 받아 order-service로 넘겨주는 reverse proxy입니다.
  nginx:
    image: nginx:1.27-alpine
    container_name: commerce-nginx
    depends_on:
      - order-service
    # Mac의 8082 포트로 들어온 요청을 NGINX 컨테이너의 80 포트로 전달합니다.
    ports:
      - "8082:80"
    # 로컬 nginx/default.conf 파일을 컨테이너 설정 파일 위치에 읽기 전용으로 연결합니다.
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

# named volume은 Docker가 관리하는 영구 저장 공간입니다.
volumes:
  order-db-data:
  redis-data:
  kafka-data:
